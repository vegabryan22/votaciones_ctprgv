<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mantenimiento</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style_dashboard.css') }}?v=20260528b">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style_upload.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>


    <style>
        :root {
            --brand: #0f3d66;
            --brand-2: #1e70bf;
            --bg: #eef4fb;
            --panel: #ffffff;
            --text: #1f2937;
            --muted: #667085;
            --line: #d9e3ef;
        }

        body {
            margin: 0;
            background: linear-gradient(120deg, var(--bg) 0%, #f8fbff 100%);
            color: var(--text);
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        .sidebar {
            height: 100vh;
            width: 270px;
            position: fixed;
            top: 0;
            left: 0;
            background: linear-gradient(180deg, #0f3d66 0%, #123a5c 100%);
            color: #fff;
            border-right: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 10px 30px rgba(0, 0, 0, .18);
            padding: 14px 10px;
            z-index: 20;
            overflow-y: auto;
        }

        .sidebar h4 {
            color: #fff;
            font-weight: 700;
            letter-spacing: .2px;
            margin-bottom: 14px;
        }

        .content {
            margin-left: 270px;
            min-height: 100vh;
            padding: 12px 24px 24px;
        }

        .content .container {
            max-width: 1180px;
            background: transparent;
            padding-left: 0;
            padding-right: 0;
        }

        .logo {
            width: 42px;
            height: 42px;
            margin-right: 10px;
            border-radius: 10px;
            background: rgba(255, 255, 255, .92);
            padding: 4px;
            object-fit: contain;
        }

        .sidebar .nav-link {
            color: rgba(255, 255, 255, .95);
            border-radius: 10px;
            padding: 10px 12px;
            margin: 3px 6px;
            font-size: 1.05rem;
            transition: .16s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sidebar .nav-link i {
            width: 18px;
            text-align: center;
        }

        .sidebar .nav-link:hover,
        .sidebar .nav-link.active {
            background: rgba(255, 255, 255, .18);
            color: #fff;
            text-decoration: none;
            transform: translateX(2px);
        }

        .content .card {
            border: 1px solid var(--line);
            border-radius: 14px;
            box-shadow: 0 10px 24px rgba(15, 61, 102, .08);
        }

        h1, h2, h3, h4 {
            color: #102a43;
            font-weight: 700;
        }

        .btn-primary {
            background-color: var(--brand-2);
            border-color: var(--brand-2);
        }

        .btn-primary:hover {
            background-color: #185f9f;
            border-color: #185f9f;
        }

        .footer {
            margin-top: 24px;
            color: var(--muted);
            font-size: .92rem;
        }

        @media (max-width: 992px) {
            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
            }
            .content {
                margin-left: 0;
                padding: 14px;
            }
        }
    </style>
</head>

<body>
    <div class="sidebar">
        <h4 class="text-center">
            <img src="/votaciones_backend/static/uploads/ctprgv_logo.png" alt="Logo del Colegio" class="logo">
            Menú de Mantenimiento
        </h4>
        <ul class="nav flex-column">
            <li class="nav-item">
                <a class="nav-link {{ 'active' if request.endpoint in ['mantenimiento', 'viewer_dashboard'] else '' }}" href="{{ url_for('mantenimiento') }}">
                    <i class="fas fa-tachometer-alt"></i> Dashboard
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link {{ 'active' if request.endpoint == 'candidatos' else '' }}" href="{{ url_for('candidatos') }}">
                    <i class="fas fa-user"></i> Candidatos
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link {{ 'active' if request.endpoint == 'estudiantes' else '' }}" href="{{ url_for('estudiantes') }}">
                    <i class="fas fa-graduation-cap"></i> Estudiantes
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link {{ 'active' if request.endpoint == 'upload_file' else '' }}" href="{{ url_for('upload_file') }}">
                    <i class="fas fa-file-upload"></i> Cargar Estudiantes
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link {{ 'active' if request.endpoint in ['abstencionistas', 'exportar_abstencionistas'] else '' }}" href="{{ url_for('abstencionistas') }}">
                    <i class="fas fa-user-clock"></i> Abstencionistas
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link {{ 'active' if request.endpoint == 'mantenimiento_sitio' else '' }}" href="{{ url_for('mantenimiento_sitio') }}">
                    <i class="fas fa-tools"></i> Mantenimiento sitio
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link {{ 'active' if request.endpoint == 'usuarios' else '' }}" href="{{ url_for('usuarios') }}">
                    <i class="fas fa-users-cog"></i> Usuarios
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link {{ 'active' if request.endpoint == 'bitacora_sistema' else '' }}" href="{{ url_for('bitacora_sistema') }}">
                    <i class="fas fa-clipboard-list"></i> Bitacora
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link {{ 'active' if request.endpoint == 'manual_uso' else '' }}" href="{{ url_for('manual_uso') }}">
                    <i class="fas fa-book-open"></i> Manual de uso
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="{{ url_for('logout') }}">
                    <i class="fas fa-sign-out-alt"></i> Salir
                </a>
            </li>
        </ul>
    </div>
    <div class="content">
        {% block content %}
        <!-- Contenido específico de cada página aquí -->
        
        {% endblock %}
        <footer class="footer">
            <div class="container text-center">
                <span class="text-muted">(c) 2025 CTPRGV - Departamento de REDES - v{{ system_version }}</span>
            </div>
        </footer>
    </div>
    <!-- Pie de página -->
    

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
