{% extends "layout_front.html" %}
{% block content %}
<div class="vote-card mx-auto" style="max-width: 700px;">
    <h2 class="mb-3">Paso 2: Confirmacion de identidad</h2>
    <div class="row g-3 mb-3">
        <div class="col-md-6"><strong>Cedula:</strong><br>{{ estudiante.cedula }}</div>
        <div class="col-md-6"><strong>Seccion:</strong><br>{{ estudiante.nivel }}</div>
        <div class="col-12"><strong>Nombre:</strong><br>{{ estudiante.nombre }} {{ estudiante.apellido1 }} {{ estudiante.apellido2 }}</div>
    </div>
    <div class="d-flex flex-wrap gap-2">
        <a href="{{ url_for('mostrar_candidatos') }}" class="btn btn-ok btn-lg">Confirmar y votar</a>
        <a href="{{ url_for('votar') }}" class="btn btn-outline-secondary btn-lg">Corregir cedula</a>
    </div>
</div>
{% endblock %}
