{% extends "layout_front.html" %}
{% block content %}
<div class="vote-card mx-auto" style="max-width: 560px;">
    <h2 class="mb-2">Acceso visor</h2>
    <p class="text-muted mb-3">Ingresa para consultar el dashboard en modo solo lectura.</p>
    <form method="post" action="{{ url_for('viewer_login') }}" autocomplete="off">
        <div class="mb-3">
            <label class="form-label">Usuario</label>
            <input class="form-control form-control-lg" name="username" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Contraseña</label>
            <input class="form-control form-control-lg" type="password" name="password" required>
        </div>
        <button class="btn btn-brand btn-lg w-100" type="submit">Ingresar</button>
    </form>
</div>
{% endblock %}
