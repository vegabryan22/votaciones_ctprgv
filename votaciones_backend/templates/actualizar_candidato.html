<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Actualizar Candidato</title>
    <link rel="stylesheet" href="/votaciones_backend/static/style.css">
</head>
<body>
    <h1>Actualizar Candidato</h1>
    <form action="{{ url_for('actualizar_candidato', id=candidato['id']) }}" method="post" enctype="multipart/form-data">
        <label for="nombre">Nombre:</label>
        <input type="text" id="nombre" name="nombre" value="{{ candidato['nombre'] }}" required>

        <label for="imagen">Imagen (opcional, dejar en blanco para mantener la actual):</label>
        <input type="file" id="imagen" name="imagen" accept="image/*">
        
        <button type="submit">Actualizar</button>
    </form>
</body>
</html>
