{% extends "layout_front.html" %}
{% block content %}
<div class="vote-card mx-auto" style="max-width: 560px;">
    <h2 class="mb-2">Acceso administrador</h2>
    <p class="text-muted mb-3">Ingresa tus credenciales para mantenimiento administrativo.</p>
    <form method="POST" autocomplete="off">
        <div class="mb-3">
            <label for="username" class="form-label">Nombre de usuario</label>
            <input type="text" class="form-control form-control-lg" id="username" name="username" required>
        </div>
        <div class="mb-3">
            <label for="password" class="form-label">Contraseña</label>
            <input type="password" class="form-control form-control-lg" id="password" name="password" required>
        </div>
        <button type="submit" class="btn btn-brand btn-lg w-100">Iniciar sesión</button>
    </form>
</div>
{% endblock %}
